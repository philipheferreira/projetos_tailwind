<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartão de Perfil com Tailwind CSS</title>
    
    <!-- 1. Incluindo o Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <!-- 2. O Container Principal do nosso Cartão -->
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-sm mx-4">
        
        <!-- Imagem de Perfil -->
        <img class="w-24 h-24 rounded-full mx-auto mb-4 object-cover" 
             src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80" 
             alt="Foto de Perfil">
        
        <!-- Informações do Perfil -->
        <div class="text-center">
            <h2 class="text-2xl font-bold text-gray-800">João da Silva</h2>
            <p class="text-gray-600 mt-1">Desenvolvedor Web</p>
            <p class="text-sm text-gray-500 mt-3">
                Apaixonado por criar experiências web incríveis e código limpo.
            </p>
        </div>
        
        <!-- Botão de Ação -->
        <div class="mt-6 text-center">
            <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition-colors duration-300">
                Entrar em Contato
            </button>
        </div>
        
    </div>

</body>
</html>
